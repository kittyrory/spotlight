<!DOCTYPE html>
<head>
  <html lang="en">
  <meta charset="UTF-8">
  <title>Spotlight | Origin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- font links -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,300;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    body {
      background-color: black;
      color: white;
      font-family: 'Open Sans', sans-serif;
    }

    .div1 {
      text-align: center;
    }

    .div2 {
      display: block;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      text-align: left;
      padding: 0 16px;
      box-sizing: border-box;
    }

    .progress-bar {
      display: flex;
      gap: 6px;
      width: 100%;
      margin-bottom: 28px;
      padding-top: 9px;
    }

    .progress-step {
      flex: 1;
      height: 3px;
    }

    .p1 {
      color: #e2bb00;
      font-family: 'Open Sans', sans-serif;
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'Open Sans', Arial;
      font-size: 32px;
      margin-bottom: 6px;
    }

    .p2 {
      font-family: 'Open Sans', sans-serif;
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .option {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 14px 14px 12px;
      border: 1px solid #444;
      border-radius: 10px;
      background: #1a1a1a;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.18s, background 0.18s, transform 0.15s;
      user-select: none;
    }

    .option:hover {
      border-color: #A38800;
      background: #242424;
      transform: translateY(-1px);
    }

    .option.selected {
      background: #0D0D0D;
      border-color: #e2bb00;
    }

    .icon {
      font-size: 22px;
      line-height: 1;
      margin-bottom: 6px;
      display: block;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: white;
      line-height: 1.2;
    }

    .card-sub {
      font-size: 12px;
      color: #888;
      line-height: 1.3;
    }

    .card-grid.shake {
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(-6px); }
      50%  { transform: translateX(6px); }
      75%  { transform: translateX(-4px); }
      100% { transform: translateX(0); }
    }

    .cont {
      background-color: #e2bb00;
      border: none;
      width: 100%;
      height: 50px;
      border-radius: 10px;
      margin-top: 10px;
      font-family: 'Urbanist', 'Open Sans', Arial;
      font-size: 18px;
      cursor: pointer;
      display: block;
      color: black;
      transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
    }

    .cont:hover {
      background: #FFD500;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(201,149,42,0.3);
    }

    .cont:active {
      transform: scale(0.98);
    }

    .back {
      width: 100%;
      border: 1px solid #555;
      border-radius: 10px;
      background-color: black;
      color: #555;
      margin-top: 10px;
      height: 50px;
      align-items: center;
      text-align: center;
      display: flex;
      justify-content: center;
      cursor: pointer;
      font-size: 15px;
      transition: color 0.15s, border-color 0.15s;
    }

    .back:hover {
      color: #808080;
      border: 1px solid #808080;
    }
  </style>
</head>

  <body>
    <div class="div1">
      <div class="div2">
        <div class="progress-bar">
          <div class="progress-step" style="background: #755C00;"></div>
          <div class="progress-step" style="background: #755C00;"></div>
          <div class="progress-step" style="background: #e2bb00;"></div>
        </div>

        <p class="p1">Step 3 of 3 · Origin</p>
        <h1>How did you get here?</h1>
        <p class="p2">Your origin is your backstory. The world already has opinions.</p>

        <div class="container">
          <div class="option">
            <span class="icon">⚡</span>
            <span class="title">Viral Moment</span>
          </div>
          <div class="option">
            <span class="icon">🏢</span>
            <span class="title">Industry Plant</span>
          </div>
        </div>

        <div class="container">
          <div class="option">
            <span class="icon">🌑</span>
            <span class="title">Underground Legend</span>
          </div>
          <div class="option">
            <span class="icon">📺</span>
            <span class="title">Reality TV</span>
          </div>
        </div>

        <div class="container">
          <div class="option">
            <span class="icon">🎀</span>
            <span class="title">Nepotism Baby</span>
          </div>
          <div class="option">
            <span class="icon">🔥</span>
            <span class="title">Self-Made</span>
          </div>
        </div>

        <div>
          <a href="profile.html"><button class="cont">Continue →</button></a>
          <a href="fame-path.html"><button class="back">← Back</button></a>
        </div>
      </div>
    </div>
  </body>

  <script src="scripts/options.js"></script>
</html>
