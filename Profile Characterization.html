<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width initial-scale=1.0">
  <title>Profile Setup</title>
 <style>
  {
   box-sizing: border-box;
 }
   .header-preview-box {
    aspect-ratio: 3/1;
    width: 1500px;
    max-width: 100%;
    object-fit: cover;
    position: relative;
    width: 100%;
    height: 180px;
    background: linear-gradient(225deg, #AE8625, #F7EF8A, #D2AC47, #EDC967 100%);
    margin-bottom: 40px;
    border: radius 16px;
    transition:opacity 0.3s ease;
    overflow: hidden;
    cursor: pointer;
   }
   .header-preview-box:hover {
    cursor: pointer;
    transition: background 0.3 ease;
    opacity: 0.85;
   }
   .header-preview-box::after {
    content: "Add Picture";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    color: white;
    background: rgba(0,0,0,0.6);
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    }
    .header-preview-box:hover::after {
    opacity: 1;
    }

.avatar-circle {
  aspect-ratio: 1/1;
  width: 400px;
  max-width: 100%;
    object-fit: cover;
  position: absolute;
  bottom: -35px;
  left: 32px;
  width: 90px;
  height: 90px;
  max-width: 400px;
  aspect-ratio: 1/1;
  background: #111;
  display: flex;
    border: 3px solid #161616;
    border-radius: 50%;
    align-items: center;
  justify-content: center;
  box-shadow: 0 6px 12px rgba (0,0,0,0.7);
}
.avatar-emoji {
   font-size: 36px;
  width: 100%;
height: 100%;
object-fit: cover; 
}
.avatar-circle:hover {
    background: linear-gradient(225deg, #b58b22 0%, #57420a 35%, #1c1607 70%, #0000 100%)!important;
    cursor: pointer;
    transition: background 0.5 ease;
    opacity: 0.85;
}
 .avatar-circle::after {
 content: "Add Picture";
 position: absolute;
 top: 50%;
 left: 50%;
 transform: translate(-50%, -50%);
 font-size: 24px;
 color: white;
 background: rgba(0,0,0,0.6);
 width: 30px;
 height: 30px;
 border-radius: 50%;
 display: flex;
 align-items: center;
 justify-content: center;
 opacity: 0;
 transition: opacity 0.3s ease;
 pointer-events: none;
  }

 .avatar-circle:hover::after {
   opacity: 1;
}
.placeholder-text{
 color: #555;
 font-size: 11px;
 margin-top: 5px;
 opacity: 0;
 transition: opacity 0.3s ease;
 pointer-events: none;
}  
input[type="file"] {
  display: none;
}
#placeholder-text, 
.file-name
.browse-text {
  display:none;
}
.header-title {
  color: #fff;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.3px;
  margin: 0;
  text-align: center;
}
.header-spacer {
  width: 40px;
}

   body {
    background: black;
  margin:0 auto;
  color: aliceblue;
  font-family: 'Open Sans', sans-serif;
  width: 100%;
  max-width: 500px;
  padding:40px 20px;
  padding-top: 60px;
}
.section-divider {
  width: 100%;
  position: relative;
  height: 1px;
  background-color: #1a1a1a;
  margin: 24px;
  margin-bottom: 24px;
  border: none;
}

     .icon {
      font-size: 24px;
      background-color: black;
      padding: 16px;
      border: 1px solid #333;
      justify-content: center;
      border-radius: 12px;
      box-sizing: border-box;
      margin-bottom: 15px;
      display:inline-flex;
      align-items:center;
      height: 50px;
      width: 50px;
      text-align: left;
    }
    .profile-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
      text-align: left;
      font-size: 12px;
      color: #686868;
    }
    .profile-text h2{
     color: #888
    font-size: 14px;
    color: #ffff;
    font-weight: 600;
    margin:0;
    }
    .form-selection {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 20px 0;
      color: grey;
    }
    .field-input {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 16px;
      padding: 4px 0;
      outline: none;
      width: 100%;
      border-color: #3333;
    }
    .handle-prefix {
      color: #fff;
      font-size: 16px;
      user-select: none;
    }
.form-input {
 box-sizing: border-box;
 background-color: #121212;
 border: 1px solid #222222;
 border-radius: 12px !important;
 color: #ffff !important;
  font-size: 14px;
  width: 100%;
  outline: none !important;
  padding: 16px !important;
}
  .form-input::placeholder { 
    color: #555;
}
.profile-text p{
  color: #6666666;
  font-size: 11px !important;
  margin: 2px 0 0;
}
.bio-section {
  width: 100%;
  box-sizing: border-box;
  margin-top: 24px;
}
  .bio-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
.bio-title {
  color: #fff
  font-size: 16px;
  font-weight: 700;
}
.gameplay-badge {
  color: #ffcc00;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.bio-box-container {
  background-color: #121212;
  border: 1px solid #222222;
  border-radius: 12px !important;
  padding: 12px 14px !important;
  position: relative;
  display: flex;
  flex-direction: column;
}
.bio-input {
  background: transparent !important;
  border: none !important;
  color: #fff;
  font-size: 14px !important;
  line-height: 1.5;
  width: 100%;
  height: 55px;
  resize: none;
  outline: none;
  padding: 0;
  font-family: inherit;
}
.bio-input::placeholder {
  color: #555;
}
.char-counter {
  align-self: flex-end;
  color: #38342e !important;
  font-size: 10px;
  margin-top: 4px !important;
}
.bio-suggestions {
  color: #38342e;
  font-size: 11px !important;
  margin: 8px 0 0 0 !important;
}
.bio-suggestions span {
  font-style: italic;
}
.profile-card:hover {
  border-color: #ffd700 !important;
  background-color: #1a1a1a !important;
transition: all 0.2s ease;
}
 .cont {
      background-color: #e2bb00;
      border: none;
      width: 100%;
      height: 50px;
      border-radius: 10px;
      margin-top: 10px;
      font-family: 'Urbanist', 'Open Sans', Arial;
      font-size: 18px;
      cursor: pointer;
      display: block;
      transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
    }

    .cont:hover {
      background: #FFD500;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(201,149,42,0.3);
    }

    .back {
      width: 100%;
      border: 1px solid #555;
      border-radius: 10px;
      background-color: black;
      color: #555;
      margin-top: 10px;
      height: 50px;
      align-items: center;
      text-align: center;
      display: flex;
      justify-content: center;
      cursor: pointer;
      font-size: 15px;
      transition: color 0.15s, border-color 0.15s;
    }

    .back:hover {
      color: #808080;
      border: 1px solid #808080;
    }

    a:link, a:visited {
      text-decoration: none;
      color: inherit;
    }
 </style>
</head>
<body>
  <div class="header-preview-box">
    <input type="file" id="profile-input" accept="image/*" onclick="document.getElementById('profile-input').click();">
    <label for="profile-input" class="profile-circle" id="profile-label">
    <div class="avatar-circle">
      <span class="avatar-emoji">🎭</span>
    </div>
    </label>
  </div>
<div class="section-divider"></div>
<div class="form-selection">
  <label class="section-title">Display Name</label>
  <input type="text" class="form-input" placeholder="Your Stage Name">
</div>

<div class="form-selection">
  <label class="section-title">Handle</label>
  <input type="text" class="form-input" placeholder="@yourhandle">
</div>
<div class="section-divider"></div>
<div class="bio-selection">
<div class="bio-header">
  <label class="bio-title">Your Bio</label>
  <span class="gameplay-badge">⚡AFFECTS GAMEPLAY</span>
</div>

<div class="bio-box-container">
<textarea class="bio-input" placeholder="Tell the world who you are. Be iconic, be real, be chaotic-your words unlock hidden traits and shape how celebrities and fans treat you...."></textarea>
<div class="char-counter">0/150</div>
</div>
<p class="bio-suggestions">Try: <span>iconic</span>, <span>drama</span>,<span>love</span>, <span>dark</span>,<span>authentic</span>...</p>
</div>
 <a href="origin.html"><button class="cont">Continue →</button></a>
           <a href="relationshipstatus.html"><button class="back">← Back</button></a>
<script>
    // changes the color for the buttons when clicked
    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
      });
    });
  </script>
</body>
  </html>
