<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width initial-scale=1.0">
  <title>Icon Page</title>
</head>
<style>
  body {
  background: black;
  margin:0 auto;
  color: aliceblue;
  font-family: 'Open Sans', sans-serif;
  width: 100%;
  max-width: 500px;
  padding:40px 20px;
  padding-top: 60px;
}
.section-divider {
  width: 470px;
  position: relative;
  height: 1px;
  background-color: #1a1a1a;
  margin: 15px;
  border: none;
}
.header-box {
 width: 100%;
 height: 200px;
 background-color: #121212;
 border: 1px solid rgba(255, 209, 102, 0.15);
 position: relative;
 border-radius: 16px;
 display: flex;
 align-items: center;
 justify-content: center;
 margin-bottom: 55px;
 cursor: pointer;
 transition: background-color 0.2s ease;
 overflow: visible !important;
 z-index: 10;
 }
.header-box:hover {
 cursor: pointer;
 transition: background 0.5s ease;
opacity: 0.85;
}
 .avatar-circle {
  aspect-ratio: 1/1;
  width: 400px;
  max-width: 100%;
    object-fit: cover;
  position: absolute;
  bottom: -35px;
  left: 32px;
  width: 90px;
  height: 90px;
  max-width: 400px;
  aspect-ratio: 1/1;
  background: #111;
  display: flex;
    border: 3px solid #161616;
    border-radius: 50%;
    align-items: center;
  justify-content: center;
  box-shadow: 0 6px 12px rgba (0,0,0,0.7);
}
.avatar-emoji {
font-size: 36px;
width: 100%;
height: 100%;
object-fit: cover; 
display: flex;
align-items: center;
justify-content: center;
}
.avatar-circle:hover {
    background: linear-gradient(225deg, #b58b22 0%, #57420a 35%, #1c1607 70%, #0000 100%)!important;
    cursor: pointer;
    transition: background 0.3 ease;
    opacity: 0.85;
}
 .avatar-circle::after {
 content: "Add Picture";
 position: absolute;
 top: 50%;
 left: 50%;
 transform: translate(-50%, -50%);
 font-size: 24px;
 color: white;
 background: rgba(0,0,0,0.6);
 width: 30px;
 height: 30px;
 border-radius: 50%;
 display: flex;
 align-items: center;
 justify-content: center;
 opacity: 0;
 transition: opacity 0.3s ease;
 pointer-events: none;
  }
.description-box-container {
  background-color: #121212;
  border: 1px solid #222222;
  border-radius: 12px !important;
  padding: 12px 14px !important;
  position: relative;
  display: flex;
  flex-direction: column;
}
.description-input {
  background: transparent !important;
  border: none !important;
  color: #fff;
  font-size: 14px !important;
  line-height: 1.5;
  width: 100%;
  height: 80px;
  resize: none;
  outline: none;
  padding-right: 50px !important;
  font-family: inherit;
  box-sizing: border-box;
}
.edit-btn {
  position: absolute;
  top: 12px;                 
  right: 14px;               
  background-color: #222222;  
  color: #aaaaaa;             
  border: 1px solid #333333;
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
}
.description-box-container:hover {
 cursor: pointer;
 transition: background 0.9s ease;
opacity: 0.85;
}
.edit-btn:hover {
  background-color: #333333;
  color: #ffffff;
}
.Follow-Container {
  width: 100%;
  display: flex;
  gap: 30px;
  justify-content: space-between;
  text-align: center;
}
.Following, .Followers {
  box-sizing: border-box;
  border-radius: 25px;
  border: 1px solid #d3d3d3;
  flex:1;
  padding: 15px 20px;
  width: 100%;
  display: flex;
  font-family: 'Urbanist', 'Open Sans', Arial, sans-serif;
  font-size: 16px;
  flex: 1;
  color: #333;
  cursor: pointer;
}
.Following:hover {
color: #808080;
border: 1px solid #808080;
box-shadow: 0 4px 16px rgba(201,149,42,0.3);
transition: background 0.5s ease;
opacity: 0.98;
}
.Followers:hover {
color: #808080;
border: 1px solid #808080;
box-shadow: 0 4px 16px rgba(201,149,42,0.3);
transition: background 0.5s ease;
opacity: 0.98;
}
.socialite-section {
  background-color: black;
  margin: 16px 0;
  padding: 16px;
  border: 1px solid gray; 
  border-radius: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
}
.socialite-section h3 {
  font-size: 20px;
  color: white;
  margin: 0 0 16px 0;
  font-weight: 600;
}
.stat-meter-bar-container {
  margin-bottom: 45px; 
  display: flex;
  flex-direction: column;
  position: relative;
  width: 1000px;        
  max-width: 100%;    
  box-sizing: border-box;
}
.stat-meter-bar::before {
  content: '';
  display: block;
  height: 100%;              
  background-color: orange;  
  border-radius: 15px 0 0 15px;
  transition: width 0.4s ease;
  width: var(--progress,25%);            
}
.stat-label, .stat-bar-number {
  position: relative;  
  display:inline-flex;
  align-items: center;    
}
.stat-label {
  font-weight: 600;
  font-size: 16px;
  color: white;
}
.stat-bar-number {
  font-size: 15px;
  font-weight: 700;
  color: #00ba7c;   
  margin-left: 1px;
  text-shadow: none;
}
.stat-note {
  display: block;
  font-size: 13px;
  color: #aaaaaa;
  font-weight: 700;
  position: absolute;
  bottom: -20px;
  left: 0;  
  width: 40px;      
  white-space: nowrap;
  text-align: center;
}
.Relationship-Status {
  background-color: black;
  margin: 16px 0;
  padding: 15px;
  border: 1px solid gray; 
  border-radius: 16px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
}
.profile-header-row {
  display: flex;
  align-items: center;
  margin-bottom: 16px; 
  width: 430px;        
}
.relationship-avatar-circle {
  width: 44px;            
  height: 44px;
  aspect-ratio: 1/1;
  background: #111111;      
  display: flex;
  border: 2px solid #161616;
  border-radius: 50%;        
  align-items: center;
  justify-content: center;
  margin-right: 14px;        
  box-shadow: 0 4px 8px rgba(0,0,0,0.5);
}
.relationship-avatar-circle .avatar-emoji {
  font-size: 20px;        
  width: auto;
  height: auto;
}
.profile-names-block {
  display: flex;
  flex-direction: column;
}
.profile-username {
  color: white;
  font-weight: 600;
  font-size: 15px;
}
.profile-handle {
  color: #aaaaaa;            
  font-size: 13px;
  margin-top: 2px;
}
.profile-arrow {
  margin-left: 250px;        
  color: #aaaaaa;          
  font-weight: 700;
  font-size: 16px;
  font-family: sans-serif;
  user-select: none;       
}
.relationship-stat-text-row {
  display: flex;
  align-items: left;      
  justify-content: left;    
  margin-top: 10px;
  width: 100%;
  box-sizing: border-box;
  height: auto;
}
.relationship-stat-note { 
font-size: 13px;           
color: #aaaaaa;
text-align: left;  
font-weight: 700;
 white-space: normal;      
margin-left: 8px;  
}
.cont {
background-color: #e2bb00;
border: none;
width: 100%;
height: 50px;
border-radius: 10px;
margin-top: 10px;
font-family: 'Urbanist', 'Open Sans', Arial;
font-size: 18px;
cursor: pointer;
display: block;
transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
}
.cont:hover {
background: #FFD500;
transform: translateY(-1px);
box-shadow: 0 4px 16px rgba(201,149,42,0.3);
}
.back {
width: 100%;
border: 1px solid #555;
border-radius: 10px;
background-color: black;
color: #555;
margin-top: 10px;
height: 50px;
align-items: center;
text-align: center;
display: flex;
justify-content: center;
cursor: pointer;
font-size: 15px;
transition: color 0.15s, border-color 0.15s;
}
.back:hover {
color: #808080;
border: 1px solid #808080;
}
</style>
<body>
<div class="header-box">
  <h1>Add Picture</h1>
<input type="file" id="profile-input" accept="image/*">
<label for="profile-input" class="profile-avatar" id="profile-label">
<div class="avatar-circle">
<span class="avatar-emoji">🎭</span>
</div>
</label>
</div>
<div class="Follow-Container">
<div class="Following">Following</div>
</div>
<div class="description-box-container">
<textarea id="description-field" class="description-input" placeholder="Tell the world who you are.."></textarea>
<button id="action-btn" class="edit-btn" onclick="handleBioToggle()">Edit</button>
</div>
<div class="section-divider"></div>
<div class="socialite-section">
  <h3>Socialite</h3>
  <div class="stat-meter-bar-container">
    <div class="stat-text-row">
<span class="stat-label">🤣 Humor</span>
<span class="stat-bar-number">+1%</span>
</div>
<div class="stat-meter-bar" style="width:430px; background-color: #333333; height: 14px; border-radius: 15px; position: relative; overflow: hidden; margin-top: 5px; margin-bottom: 5px;"></div>
<div style="width: 25%; height: 100%; background-color:orange; border-radius: 15px 0 0 15px;"></div>
<span class="stat-note" style="display:block;">You're comedy gold!</span>
  </div>
<div class="stat-text-row">
  </div>
  <div class="stat-meter-bar-container">
    <div class="stat-text-row">
  <span class="stat-label">🧘 Aura</span>
<span class="stat-bar-number">+2%</span>
<div class="stat-meter-bar" style="width:430px; background-color: #333333; height: 14px; border-radius: 15px; position: relative; overflow: hidden; margin-top: 5px; margin-bottom: 5px;"></div>
<div style="width: 25%; height: 100%; background-color:orange; border-radius: 15px 0 0 15px;"></div>
<span class="stat-note">You have a captivating presence!</span>
  </div>
  </div>
</div>
<div class="Relationship-Status">
  <h3>Relationship Status</h3>
  <div class="profile-header-row">
<div class="relationship-avatar-circle">
<span class="avatar-emoji">🎭</span>
</div>
 <div class="profile-names-block">
<span class="profile-username">Peter Parker</span> 
 <span class="profile-handle">@TomHolland</span>
 </div>
 <span class="profile-arrow">❯</span>
  </div>
<div class="stat-meter-bar-container">
<div class="stat-meter-bar" style="width: 430px; background-color: #333333; height: 14px; border-radius: 15px; position: relative; overflow: hidden; margin-top: 10px;"></div>
  <div style="width: 25%; height: 100%; background-color: orange; border-radius: 15px 0 0 15px;"></div>
<div class="relationship-stat-text-row">
<span class="stat-bar-number">+2%</span>
<span class="relationship-stat-note">Wholesome Spider-Man wisdom lands like a perfect web.</span>
</div>
</div>
</div>
<script>
    // changes the color for the buttons when clicked
document.querySelectorAll('.option').forEach(opt => {
opt.addEventListener('click', () => {
document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
opt.classList.add('selected');
});
});
document.querySelector('.header-box').addEventListener('click', () => {
document.getElementById('profile-input').click();
});
function handleBioToggle() {
const textarea= document.getElementById("description-field");
const button= document.getElementById("action-btn");
}
</script>
</body>
</html>
