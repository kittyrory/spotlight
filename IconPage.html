<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width initial-scale=1.0">
  <title>Icon Page</title>
</head>
<style>
{
   box-sizing: border-box;
 }
    body {
    background: black;
  margin:0 auto;
  color: aliceblue;
  font-family: 'Open Sans', sans-serif;
  width: 100%;
  max-width: 500px;
  padding:40px 20px;
  padding-top: 60px;
}
.section-divider {
  width: 100%;
  position: relative;
  height: 1px;
  background-color: #1a1a1a;
  margin: 24px;
  margin-bottom: 24px;
  border: none;
}
   .header-box {
    aspect-ratio: 3/1;
    width: 1500px;
    max-width: 100%;
    object-fit: cover;
    position: relative;
    width: 100%;
    height: 180px;
    background: linear-gradient(225deg, #AE8625, #F7EF8A, #D2AC47, #EDC967 100%);
    margin-bottom: 40px;
    border-radius: 16px;
    transition:opacity 0.3s ease;
    cursor: pointer;
   }
   .header-box:hover {
    cursor: pointer;
    transition: background 0.5s ease;
    opacity: 0.85;
   }
 .avatar-circle {
  aspect-ratio: 1/1;
  width: 400px;
  max-width: 100%;
    object-fit: cover;
  position: absolute;
  bottom: -35px;
  left: 32px;
  width: 90px;
  height: 90px;
  max-width: 400px;
  aspect-ratio: 1/1;
  background: #111;
  display: flex;
    border: 3px solid #161616;
    border-radius: 50%;
    align-items: center;
  justify-content: center;
  box-shadow: 0 6px 12px rgba (0,0,0,0.7);
}
.avatar-emoji {
   font-size: 36px;
  width: 100%;
height: 100%;
object-fit: cover; 
display: flex;
align-items: center;
justify-content: center;
}
.avatar-circle:hover {
    background: linear-gradient(225deg, #b58b22 0%, #57420a 35%, #1c1607 70%, #0000 100%)!important;
    cursor: pointer;
    transition: background 0.3 ease;
    opacity: 0.85;
}
 .avatar-circle::after {
 content: "Add Picture";
 position: absolute;
 top: 50%;
 left: 50%;
 transform: translate(-50%, -50%);
 font-size: 24px;
 color: white;
 background: rgba(0,0,0,0.6);
 width: 30px;
 height: 30px;
 border-radius: 50%;
 display: flex;
 align-items: center;
 justify-content: center;
 opacity: 0;
 transition: opacity 0.3s ease;
 pointer-events: none;
  }
.description-box-container {
  background-color: #121212;
  border: 1px solid #222222;
  border-radius: 12px !important;
  padding: 12px 14px !important;
  position: relative;
  display: flex;
  flex-direction: column;
}
.description-input {
  background: transparent !important;
  border: none !important;
  color: #fff;
  font-size: 14px !important;
  line-height: 1.5;
  width: 100%;
  height: 55px;
  resize: none;
  outline: none;
  padding: 0;
  font-family: inherit;
}
.Follow-Container {
  width: 100%;
  display: flex;
  gap: 20px;
  justify-content: space-between;
  text-align: center;
}
.Following, .Followers {
  box-sizing: border-box;
  border-radius: 20px;
  border: 1px solid #d3d3d3;
  flex:1;
  padding: 15px 20px;
  width: 100%;
  display: flex;
  font-family: 'Urbanist', 'Open Sans', Arial, sans-serif;
  font-size: 16px;
  flex: 1;
  color: #333;
  cursor: pointer;
}
.socialite-section {
box-sizing: border-box; 
border-radius: 50px;
border: 1px solid #333; 
width: 100%;
height: 300px;
font-family: 'Urbanist', 'Open Sans';
font-size: 18px;
cursor: pointer;
}
.cont {
background-color: #e2bb00;
border: none;
width: 100%;
height: 50px;
border-radius: 10px;
margin-top: 10px;
font-family: 'Urbanist', 'Open Sans', Arial;
font-size: 18px;
cursor: pointer;
display: block;
transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
}
.cont:hover {
background: #FFD500;
transform: translateY(-1px);
box-shadow: 0 4px 16px rgba(201,149,42,0.3);
}
.back {
width: 100%;
border: 1px solid #555;
border-radius: 10px;
background-color: black;
color: #555;
margin-top: 10px;
height: 50px;
align-items: center;
text-align: center;
display: flex;
justify-content: center;
cursor: pointer;
font-size: 15px;
transition: color 0.15s, border-color 0.15s;
}
.back:hover {
color: #808080;
border: 1px solid #808080;
}
</style>
<body>
<div class="header-box">
<input type="file" id="profile-input" accept="image/*">
<label for="profile-input" class="profile-avatar" id="profile-label">
<div class="avatar-circle">
<span class="avatar-emoji">🎭</span>
</div>
</label>
</div>
<div class="Follow-Container">
<div class="Following">Following</div>
<div class="Followers">Followers</div>
</div>
<div class="description-box-container">
<textarea id="description-field" class="description-input" placeholder="Tell the world who you are.."></textarea>
<button id="action-btn" span class="edit-btn" onclick="handleBioToggle()">Edit</button>
</div>
<div class="section-divider"></div>
<div class="socialite-section">
<span class="section-title">Socialite Icon</span>
<span class="section-title">Humor</span>
<span class="section-title">Aura</span>
</div>
<div>
<div class="Relationship-Status">
<span class="section-title">Relationships</span>
</div>
 <a href="origin.html"><button class="cont">Continue →</button></a>
<a href="relationshipstatus.html"><button class="back">← Back</button></a>
<script>
    // changes the color for the buttons when clicked
document.querySelectorAll('.option').forEach(opt => {
opt.addEventListener('click', () => {
document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
opt.classList.add('selected');
});
});
document.querySelector('.header-box').addEventListener('click', () => {
document.getElementById('profile-input').click();
});
function handleBioToggle() {
const textarea= document.getElementById("description-field");
const button= document.getElementById("action-btn");
}.
</script>
</body>
</html>
