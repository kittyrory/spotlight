<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotlight | Choose Your World</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800;900&family=Open+Sans:wght@400;500;600&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

    <style>
      :root {
        --bg: #0e0e0e;
        --surface: #1a1a1a;
        --surface2: #222222;
        --border: rgba(255,255,255,0.08);
        --border2: rgba(255,255,255,0.13);
        --accent: #e2bb00;
        --accent2: rgba(226,187,0,0.5);
        --accent-dim: rgba(226,187,0,0.12);
        --accent-glow: rgba(226,187,0,0.25);
        --text: #f0f0f0;
        --muted: #888;
        --muted2: #555;
        --danger: #e05555;
        --radius: 12px;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Open Sans', Arial;
      }

      .wrapper {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 24px 120px;
      }
      
      .clear {
        background: transparent;
        border: 1px solid var(--border2);
        color: var(--muted);
        padding: 8px 18px;
        border-radius: 50px;
        font-family: 'Open Sans', sans-serif;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
      }
      
      .clear:hover { 
        border-color: var(--accent); 
        color: var(--text); 
      }

      .selection {
        font-family: 'Source Code Pro', monospace;
        font-size: 12px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      
      span {
        color: var(--accent);
        font-weight: bold;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 28px 0 24px;
        border-bottom: 1px solid var(--border);
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      
      .logo {
        font-family: 'Urbanist', sans-serif;
        font-weight: 900;
        font-size: 18px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text);
      }
      
      .confirm-bar {
        display: none;
      }
      
      h1 {
        font-family: 'Urbanist', sans-serif;
        font-weight: 800;
        color: var(--text);
        margin-bottom: 12px;
      }
      
      .subtitle {
        color: var(--muted);
        font-size: 13px;
      }
      
      .world-selection {
        font-family: 'Source Code Pro', monospace;
        font-size: 13px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 14px;
      }
      
      .main {
        padding: 30px 1px;
        animation: fadeDown 0.6s ease both;
      }
      
      .categories {
        white-space: nowrap;
        overflow: scroll;
      }

      .cat-btn {
        background: var(--surface);
        border: 1.5px solid var(--border2);
        color: var(--muted);
        padding: 9px 20px;
        border-radius: 50px;
        font-family: 'Urbanist', sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.2px;
      }

      .cat-btn:hover {
        border-color: var(--accent-glow);
        background: var(--surface2);
        color: var(--text);
      }

      .cat-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--bg);
      }

      .search-create {
        margin-top: 30px;
        display: flex;
        gap: 10px;
        margin-bottom: 32px;
        animation: fadeUp 0.5s 0.2s ease both;
      }

      .create-btn {
        background: var(--accent);
        border: none;
        color: var(--bg);
        padding: 12px 22px;
        border-radius: var(--radius);
        font-family: 'Urbanist', Arial;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.15s;
        white-space: nowrap;
        letter-spacing: 0.3px;
      }

      .create-btn:hover {
        opacity: 0.55;
        transform: translateY(-1px);
      }
  
      .search {
        position: relative;
        flex: 1;
      }
  
      .search svg {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted2);
        pointer-events: none;
      }
 
      .search-input {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border2);
        color: var(--text);
        padding: 12px 16px 12px 42px;
        border-radius: var(--radius);
        font-family: 'Open Sans', sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
        box-sizing: border-box;
      }

      .search-input::placeholder { 
        color: var(--muted2); 
      }

      .search-input:focus { 
        border-color: var(--accent2); 
      }

      .worlds {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
      }

      .world-btn {
        width: 250px;
        background: var(--surface);
        border: 1.5px solid var(--border2);
        border-radius: 16px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: left;
        padding: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .world-btn:hover {
        border-color: var(--accent2);
        background: var(--surface2);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      }

      .world-btn-img {
        width: 100%;
        height: 130px;
        object-fit: cover;
        display: block;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
      }

      .world-btn-body {
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .world-btn-title {
        font-family: 'Urbanist', sans-serif;
        font-size: 16px;
        font-weight: 800;
        color: var(--text);
        letter-spacing: 0.3px;
      }

      .world-btn-desc {
        font-family: 'Open Sans', sans-serif;
        font-size: 11.5px;
        color: var(--muted);
        line-height: 1.6;
      }

      .world-btn-tag {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 4px;
      }

      .tag {
        background: var(--surface2);
        border: 1px solid var(--border2);
        color: var(--muted);
        padding: 4px 10px;
        border-radius: 50px;
        font-family: 'Urbanist', sans-serif;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: 0.2px;
      }
    </style>
  </head>

  <script src="scripts/worlds.js"></script>

  <script>
    const worldsContainer = document.getElementById("worldsContainer");
  
    worlds.forEach(world => {
  
      const tagsHTML = world.tags
        .map(tag => `<span class="tag">${tag}</span>`)
        .join("");
  
      worldsContainer.innerHTML += `
        <button class="world-btn">
  
          <img
            class="world-btn-img"
            src="${world.image}"
          >
  
          <div class="world-btn-body">
  
            <div class="world-btn-title">
              ${world.title}
            </div>
  
            <div class="world-btn-desc">
              ${world.desc}
            </div>
  
            <div class="world-btn-tag">
              ${tagsHTML}
            </div>
  
          </div>
  
        </button>
      `;
    });
  </script>

  <body>
    <div class="wrapper">
      <header>
        <div class="header">
          <div class="logo">SPOT<span>LIGHT</span></div>
          <div class="header-right">
            <div class="selection" id="selection"><span>0</span> / 3</div>
            <button class="clear">Clear</button>
          </div>
        </div>
      </header>
      
      <div class="main">
        <p class="world-selection">World Selection</p>
        <h1>Choose your World(s)</h1>
        <p class="subtitle">This dictates character interactions and events. You can pick up to <span>3 worlds.</span></p>
      </div>

      <div class="categories">
        <button class="cat-btn">All</button>
        <button class="cat-btn">K-Pop</button>
        <button class="cat-btn">Hip-Hop & Pop</button>
        <button class="cat-btn">Anime & Film/TV</button>
        <button class="cat-btn">Fantasy</button>
        <button class="cat-btn">Sports</button>
      </div>

      <div class="search-create">
        <div class="search">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input class="search-input" id="searchInput" type="text" placeholder="Search Worlds...">
        </div>
        <button class="create-btn">+ Create World</button>
      </div>

      <div class="worlds" id="worldsContainer"></div>
    </div>

    <div class="confirm-bar" id="confirmBar">
      <div class="confirm-left">
        <div class="confirm-count">Selected: <span id="countText">0 / 3</span></div>
        <div class="selected-previews" id="selectedPreviews"></div>
      </div>
      <button class="btn-confirm">Enter the Spotlight &rarr;</button>
    </div>
  </body>
</html>
